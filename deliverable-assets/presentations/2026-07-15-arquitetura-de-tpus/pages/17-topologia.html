      <text x="346" y="322" style="font-weight:600; font-size:14px;">B</text>

      <text class="d-label" x="245" y="372" text-anchor="middle">a mensagem pula de vizinho em vizinho, e cada salto custa tempo</text>

      <text x="765" y="44" text-anchor="middle" style="font-weight:600;">Toro 2D = malha + retorno nas bordas</text>

      <!-- escala real e ligação com a disciplina -->
      <text class="d-label" x="568" y="404" text-anchor="middle">Pod: conjunto de chips ligados pelo ICI (90 GB/s por eixo na v5p). v5e/v6e: toro 2D 16×16, 256 chips; v4/v5p: toro 3D, até 8.960 chips.</text>
      <text class="d-label" x="568" y="426" text-anchor="middle" style="font-weight:600;">São as mesmas topologias de redes de interconexão da disciplina: malha, toro, hipercubo.</text>
