<!-- ======================================================================
     SLIDE 11 — TAXONOMIA DE FLYNN
     ====================================================================== -->
<section class="slide">
  <div class="content">
    <div class="kicker">Classificação</div>
    <h2 class="heading" data-asset="heading">Onde a TPU cai na <span class="em">taxonomia de Flynn</span>?</h2>
    <div class="body">
    <svg class="diagram" data-asset="diagram" width="1136" height="440" viewBox="0 0 1136 440">
      <defs>
        <marker id="arrow-blue-3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M0 0 L10 5 L0 10 z" fill="#00408F"/>
        </marker>
      </defs>

      <!-- eixos -->
      <text class="d-label" x="370" y="24" text-anchor="middle" style="font-weight:600;">UM fluxo de dados (SD)</text>
      <text class="d-label" x="850" y="24" text-anchor="middle" style="font-weight:600;">MÚLTIPLOS fluxos de dados (MD)</text>
      <text class="d-label" x="52" y="110" text-anchor="middle" style="font-weight:600;" transform="rotate(-90 52 110)">UMA instrução (SI)</text>
      <text class="d-label" x="52" y="300" text-anchor="middle" style="font-weight:600;" transform="rotate(-90 52 300)">MÚLTIPLAS (MI)</text>

      <!-- quadrantes -->
      <rect class="d-node" x="140" y="40" width="460" height="150" rx="16"/>
      <text x="170" y="80">SISD</text>
      <text class="d-label" x="170" y="108">CPU de um núcleo</text>
      <text class="d-label" x="170" y="128">um fluxo de instruções sobre um fluxo de dados</text>

      <rect class="d-node-tile" x="620" y="40" width="460" height="150" rx="16"/>
      <text x="650" y="80">SIMD</text>
      <text class="d-label" x="650" y="108">GPU (variante SIMT) · extensões vetoriais (AVX/NEON)</text>
      <text class="d-label" x="650" y="128">uma instrução aplicada a muitos dados de uma vez</text>

      <rect class="d-node" x="140" y="230" width="460" height="150" rx="16"/>
      <text x="170" y="270">MISD</text>
      <text class="d-label" x="170" y="298">quase vazio na prática</text>
      <text class="d-label" x="170" y="318">citação clássica: arrays sistólicos (classificação contestada)</text>

      <rect class="d-node" x="620" y="230" width="460" height="150" rx="16"/>
      <text x="650" y="270">MIMD</text>
      <text class="d-label" x="650" y="298">CPU multicore · clusters · multiprocessadores</text>
      <text class="d-label" x="650" y="318">fluxos independentes de instruções e de dados</text>

      <!-- TPU: entre SIMD e MISD -->
      <rect x="700" y="152" width="170" height="40" rx="20" fill="#00408F"/>
      <text x="785" y="178" text-anchor="middle" fill="#ffffff" style="font-weight:600;">TPU (MXU)</text>
      <path class="d-edge-dash" d="M700 176 C 560 210, 480 224, 604 268" fill="none" stroke="#00408F" marker-end="url(#arrow-blue-3)"/>

      <!-- veredicto -->
      <text class="d-label" x="140" y="412">Veredicto: a TPU executa <tspan style="font-weight:600;" fill="#00408F">uma instrução (MatrixMultiply) sobre 65.536 dados — comportamento SIMD</tspan> —</text>
      <text class="d-label" x="140" y="432">mas, no array sistólico, os dados se transformam ao fluir de célula em célula, um traço que lembra MISD. Flynn não captura dataflow.</text>
    </svg>
    </div>
  </div>
  <div class="footer">
    <img src="assets/ufpel-marca.svg" alt="">
    <span class="f-title">Arquitetura de TPUs</span>
    <span class="f-page"><b>11</b> / 16</span>
  </div>
</section>
